<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find a Distributor — Yamamoto North America</title>
  <meta name="description" content="Find a Yamamoto distributor near you across the USA, Canada and the Caribbean.">
  <link rel="icon" href="/img/logo/favicon.png" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Saira+Condensed:wght@500;600;700;800&family=Saira:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <!-- Font Awesome Kit 0a6d31be35 (SVG+JS): converts <i> tags to icons, incl. ones injected by our JS -->
  <script src="https://kit.fontawesome.com/0a6d31be35.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/DrawSVGPlugin.min.js"></script>
  <script type="module" src="/js/main.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-shell="header"></div>
  <noscript><div style="background:#E2231A;color:#fff;padding:.6rem 1rem;font-family:monospace">Call <a href="tel:+18662040519" style="color:#fff">866-204-0519</a> to be connected with your nearest distributor.</div></noscript>

  <main id="main">
    <section class="page-hero">
      <div class="grid-bg"></div>
      <div class="container page-hero__inner">
        <div class="breadcrumb"><a href="/">Home</a><span class="sep">/</span><span>Find a Distributor</span></div>
        <span class="overline">Find a Distributor</span>
        <h1 style="margin:.5rem 0">Find a distributor</h1>
        <p class="lead">Filter by region to find your nearest Yamamoto distributor. <span style="color:var(--color-fog);font-family:var(--font-mono);font-size:var(--fs-xs)">[Distributor list &amp; regions: NEEDS CONFIRMATION]</span></p>
      </div>
    </section>

    <section class="section--tight">
      <div class="container">
        <div class="locator">
          <div class="locator__panel">
            <div class="locator__filters">
              <div class="field" style="margin:0">
                <label for="region">Region</label>
                <select id="region" data-dealer-region></select>
              </div>
            </div>
            <div data-dealers><div class="dealer-item"><p>Loading distributors…</p></div></div>
          </div>
          <div class="locator__map">
            <div class="grid-bg"></div>
            <div style="position:relative;text-align:center;color:var(--color-fog);font-family:var(--font-mono);font-size:var(--fs-xs)">
              <i class="fa-thin fa-location-dot ic-fx" style="font-size:44px;color:var(--color-red)" aria-hidden="true"></i>
              INTERACTIVE MAP · integration point
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-shell="footer"></div>
</body>
</html>
